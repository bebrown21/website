<mat-toolbar class="toolbar">
  <div class="toolbar__left">
    <button class="mobile-menu" mat-icon-button color="primary">
      <mat-icon>menu</mat-icon>
    </button>

    <button
      mat-button
      routerLink="/"
      routerLinkActive="active"
      ariaCurrentWhenActive="page"
      aria-label="Home"
      matTooltip="Home"
    >
      <mat-icon class="material-icons">home</mat-icon>
      <span>Brandon Brown</span>
    </button>
  </div>

  <div class="toolbar__right">
    <button
      mat-fab
      extended
      class="toolbar-btn"
      color="primary"
      routerLink="portfolio"
      routerLinkActive="active"
      ariaCurrentWhenActive="page"
      aria-label="Portfolio"
      matTooltip="Portfolio"
    >
      <span class="toolbar-btn__label">Portfolio</span>
      <mat-icon class="material-icons">folder_open</mat-icon>
    </button>

    <button
      mat-fab
      extended
      class="toolbar-btn"
      color="primary"
      routerLink="/about"
      routerLinkActive="active"
      ariaCurrentWhenActive="page"
      aria-label="About"
      matTooltip="About"
    >
      <span class="toolbar-btn__label">About</span>
      <mat-icon class="material-icons">mood</mat-icon>
    </button>

    <button
      mat-fab
      extended
      class="toolbar-btn"
      color="primary"
      routerLink="/contact"
      routerLinkActive="active"
      ariaCurrentWhenActive="page"
      aria-label="Contact"
      matTooltip="Contact"
    >
      <span class="toolbar-btn__label">Contact</span>
      <mat-icon class="material-icons">phone</mat-icon>
    </button>

    <button
      mat-fab
      class="theme-toggle toolbar-btn"
      aria-label="Change theme"
      matTooltip="Theme"
      [matMenuTriggerFor]="themeMenu"
    >
      <mat-icon>
        {{ (isDark$ | async) === true ? "dark_mode" : "light_mode" }}
      </mat-icon>
    </button>
    <mat-menu #themeMenu>
      <button mat-menu-item (click)="changeTheme('auto')">System</button>
      <button mat-menu-item (click)="changeTheme('light')">Light</button>
      <button mat-menu-item (click)="changeTheme('dark')">Dark</button>
    </mat-menu>

    <app-color-picker></app-color-picker>
  </div>
</mat-toolbar>
